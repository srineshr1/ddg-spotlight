# ── ddg-spotlight: full-screen, sharp (no-blur) web-search overlay ─────────
#
# Append these lines to your Hyprland config. On Omarchy the natural homes are:
#   • the keybind     -> ~/.config/hypr/bindings.conf
#   • the windowrules -> ~/.config/hypr/looknfeel.conf  (or hyprland.conf)
# (Putting them all in either file also works — Hyprland merges them.)
#
# After editing, reload with:  hyprctl reload

# Keybind: Super + S opens the spotlight in a floating Alacritty window.
# `--class ddg-spotlight` tags the window so the rules below can target it.
# `--config-file` applies the dedicated font/opacity config.
bindd = SUPER, S, Web search, exec, alacritty --config-file ~/.config/alacritty/ddg-spotlight.toml --class ddg-spotlight -e ~/.local/bin/ddg-spotlight

# Window rules: a full-screen, floating, NON-blurred overlay. The app itself
# draws a small centered card that grows as you type/search; the surrounding
# margins are transparent, so the desktop shows through — dimmed but sharp.
#
# The dim comes from `window.opacity` in ~/.config/alacritty/ddg-spotlight.toml
# (the card paints an explicit background, so it stays opaque; only the margins
# are translucent). `no_blur` is what removes the Hyprland background blur.
windowrule = float on,       match:class ^(ddg-spotlight)$
windowrule = move 0 0,       match:class ^(ddg-spotlight)$
windowrule = size 100% 100%, match:class ^(ddg-spotlight)$
windowrule = no_blur on,     match:class ^(ddg-spotlight)$
windowrule = border_size 0,  match:class ^(ddg-spotlight)$
