# ── ddg-spotlight: floating, centered web-search launcher ──────────────────
#
# Append these lines to your Hyprland config. On Omarchy the natural homes are:
#   • the keybind  -> ~/.config/hypr/bindings.conf
#   • the windowrules -> ~/.config/hypr/looknfeel.conf
# (Putting them all in either file also works — Hyprland merges them.)
#
# After editing, reload with:  hyprctl reload

# Keybind: Super + S opens the spotlight in a floating Alacritty window.
# `--class ddg-spotlight` tags the window so the rules below can target it.
# Use the absolute path to the binary so it works regardless of Hyprland's PATH.
bindd = SUPER, S, Web search, exec, alacritty --class ddg-spotlight -e ~/.local/bin/ddg-spotlight

# Window rules: float it, give it a compact spotlight size, center it,
# and dim everything behind it for that "Spotlight" feel.
windowrule = float on,      match:class ^(ddg-spotlight)$
windowrule = size 600 420,  match:class ^(ddg-spotlight)$
windowrule = center on,     match:class ^(ddg-spotlight)$
windowrule = border_size 0, match:class ^(ddg-spotlight)$

# Optional: auto-close the window when it loses focus (true Spotlight behavior).
# Uncomment if you want the launcher to vanish when you click away.
# windowrule = pin, class:^(ddg-spotlight)$
